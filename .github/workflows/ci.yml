name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: cd backend && uv sync

      - name: Lint (ruff)
        run: cd backend && uv run ruff check .

      - name: Type check (ty)
        run: cd backend && uv run ty check src

      - name: Test (pytest)
        run: cd backend && PYTHONPATH=src uv run pytest

  interface:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: cd interface && uv sync

      - name: Lint (ruff)
        run: cd interface && uv run ruff check .

      - name: Type check (ty)
        run: cd interface && uv run ty check src

      - name: Test (pytest)
        run: cd interface && PYTHONPATH=src uv run pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Lint (eslint)
        run: cd frontend && npm run lint

      - name: Test (vitest)
        run: cd frontend && npm test
