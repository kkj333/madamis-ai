name: CD

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: cd-main
  cancel-in-progress: false

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  PROJECT_NUMBER: ${{ vars.GCP_PROJECT_NUMBER }}
  REGION: asia-northeast1
  ARTIFACT_REPOSITORY: madamis-ai
  BACKEND_SERVICE: madamis-backend
  FRONTEND_SERVICE: madamis-frontend
  WORKLOAD_IDENTITY_POOL: github-actions
  WORKLOAD_IDENTITY_PROVIDER_ID: github
  DEPLOY_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
  DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    if: (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ env.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ env.WORKLOAD_IDENTITY_POOL }}/providers/${{ env.WORKLOAD_IDENTITY_PROVIDER_ID }}
          service_account: ${{ env.DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Set image names
        id: images
        run: |
          IMAGE_TAG="${DEPLOY_SHA}"
          REGISTRY="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}"
          {
            echo "image_tag=${IMAGE_TAG}"
            echo "backend_image=${REGISTRY}/backend:${IMAGE_TAG}"
            echo "frontend_image=${REGISTRY}/frontend:${IMAGE_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          platforms: linux/amd64
          push: true
          tags: ${{ steps.images.outputs.backend_image }}

      - name: Deploy backend
        run: |
          gcloud run services update "${BACKEND_SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${{ steps.images.outputs.backend_image }}"

      - name: Read backend URL
        id: backend
        run: |
          BACKEND_URL="$(gcloud run services describe "${BACKEND_SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --format='value(status.url)')"
          echo "url=${BACKEND_URL}" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          platforms: linux/amd64
          push: true
          tags: ${{ steps.images.outputs.frontend_image }}
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{ steps.backend.outputs.url }}

      - name: Deploy frontend
        run: |
          gcloud run services update "${FRONTEND_SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${{ steps.images.outputs.frontend_image }}"
